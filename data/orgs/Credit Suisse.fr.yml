privacyStatement:
  paragraphs:
    - 'Par données personnelles, il faut entendre en particulier les catégories suivantes
      mentionnées dans votre déclaration de protection des données du {string:privacyStatementDate},
      ainsi que les traitements de données relatifs à la personne et à l''activité client:'
  variables:
    privacyStatementDate: mai 2021
  bullets:
    - text: Finalité du traitement
      bullets:
        - Pour l'exécution des obligations contractuelles
        - text: Dans le cadre de la pesée des intérêts
          bullets:
            - Consultation de services de renseignements et échange de données avec ceux-ci (p. ex. registre des poursuites)
            - Examen et optimisation de procédures d'analyse des besoins en vue d'une approche directe de la clientèle
            - Publicité ou études de marché et d'opinion
            - Exercice de droits en justice et défense en cas de litiges juridiques
            - Prévention et élucidation d'infractions
            - Vidéosurveillance
            - Mesures de sécurité des bâtiments et installations (p. ex. contrôles d'accès)
            - Mesures de pilotage de l'activité et de développement des services et produits
            - Gestion des risques chez Credit Suisse
            - Données personnelles provenant de sources accessibles au public à des fins d'acquisition de clientèle
        - Sur la base de mon consentement
        - Sur la base d'exigences légales ou dans l'intérêt public

privacyStatement:
  paragraphs:
    - 'Unter personenbezogene Daten sind insbesondere auch die folgenden in Ihrer
      Datenschutzerklärung vom {string:privacyStatementDate} aufgeführten Kategorien,
      resp. Bearbeitungen von Daten zur Person und zur Kundenaktivität zu verstehen:'
  variables:
    privacyStatementDate: Mai 2021
  bullets:
    - text: Zwecke der Bearbeitungen
      bullets:
        - Aufnehmen, Registrieren, Abwickeln, Verwalten und Beendigen von Geschäftsbeziehungen
        - Einhaltung von Gesetzen, Weisungen und Empfehlungen von Behörden sowie von internen Regularien 
        - Risikomanagement, Prävention von Betrug und anderen unerlaubten Handlungen und umsichtige Unternehmensführung
        - Vermitteln von Produkten und Dienstleistungen Dritter
        - Marketingzwecke und Kundenpflege
        - Marktforschung, Verbesserung der Dienstleistungen und des Betriebs sowie Produktentwicklung und Weiterentwicklung selbstlernender Programme
        - Sicherheitszwecke und Zugangskontrollen
        - Kommunikation
        - Betrieb des Online-Angebots
        - Bereitstellung bestimmter Inhalte und Funktionen
        - Sicherheit und Stabilität
        - Statistik
        - Verbesserung von Angeboten
sources:

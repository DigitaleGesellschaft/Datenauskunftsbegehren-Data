        - Daten für die Marketing-Aktivitäten
        - Daten für den E-Mail Newsletter
        - Daten für Werbeanzeigen auf den Webseiten und Apps
        - Daten für optimierte Websiteinhalte
        - Daten für die Marktforschung
        - Daten für die Verwaltung und Abmeldung der Dienste
